<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小仙女亲启 💌</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 80%;
            backdrop-filter: blur(5px);
            transition: all 0.5s ease;
        }

        h2 {
            color: #ff4d6d;
            margin-bottom: 20px;
        }

        p {
            color: #4a4a4a;
            line-height: 1.8;
            font-size: 16px;
            margin-bottom: 30px;
            white-space: pre-line;
        }

        .btn {
            background: #ff758f;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 117, 143, 0.4);
            transition: transform 0.2s, background 0.2s;
        }

        .btn:hover {
            background: #ff4d6d;
            transform: scale(1.05);
        }

        /* 隐藏后面关卡的样式 */
        .hidden {
            display: none;
        }

        /* 爱心飘落动画 */
        .heart {
            position: absolute;
            color: #ff8fa3;
            font-size: 20px;
            animation: fall linear forwards;
            opacity: 0.8;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="layer1" class="card">
        <h2>第 1 封专属信件 ✉️</h2>
        <p>听说某人今天惹全世界最可爱的小仙女不高兴了。
        那个人现在非常非常后悔，
        托我来带个话，你愿意点开看看吗？</p>
        <button class="btn" onclick="nextLayer(1, 2)">愿意看看</button>
    </div>

    <div id="layer2" class="card hidden">
        <h2>第 2 封专属信件 📝</h2>
        <p>这次是我不好，不该惹你生气。
        惹你开心我最在行，惹你生气我真是个笨蛋。
        
        大脑已经死机反省一整天了，
        原谅卡已经充值完毕，请问可以激活吗？</p>
        <button class="btn" onclick="nextLayer(2, 3)">点此激活原谅卡</button>
    </div>

    <div id="layer3" class="card hidden">
        <h2>最后一封信 ❤️</h2>
        <p>好啦，不生气啦！
        今天的分离和不开心到此为止。
        
        接下来的日子，
        还要一起吃好多好多好吃的，
        一直手拉手走下去。
        
        大人不记小人过，原谅我好不好？</p>
        <button class="btn" onclick="finalSurprise()">好啦，原谅你</button>
    </div>

    <script>
        // 切换层级的函数
        function nextLayer(current, next) {
            document.getElementById('layer' + current).classList.add('hidden');
            const nextElement = document.getElementById('layer' + next);
            nextElement.classList.remove('hidden');
            
            // 顺便加一点点爱心效果
            for(let i=0; i<5; i++) {
                createHeart();
            }
        }

        // 终极惊喜：疯狂掉落爱心
        function finalSurprise() {
            alert("✨ 恭喜你捕捉到一只听话的男朋友！今晚等候您的差遣！✨");
            setInterval(createHeart, 150);
        }

        // 创建飘落爱心的函数
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            document.body.appendChild(heart);

            // 动画结束后移除元素，防止卡顿
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
</html>
