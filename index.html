<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和好小信件</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #ffe5ec; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .card { background: white; width: 320px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; display: none; }
        .card.active { display: block; }
        
        button { background: #ff4d6d; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        button:disabled { background: #ccc; }
        h2 { color: #ff4d6d; margin-bottom: 15px; }
        p { color: #555; line-height: 1.6; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="level1" class="card active">
        <h2>神秘信件 💌</h2>
        <p>你有一封未读的和好请求...</p>
        <button onclick="goNext(1)">点击拆阅</button>
    </div>

    <div id="level2" class="card">
        <h2>深度反思 💻</h2>
        <p>我是笨蛋，惹你生气了。经历了两天的冷战，可以原谅我吗？</p>
        <button onclick="goNext(2)">激活原谅卡</button>
    </div>

    <div id="level3" class="card">
        <h2>恭喜！🎉</h2>
        <p>谢谢宝贝的原谅！今晚听凭差遣！</p>
        <button onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        // 核心跳转函数：使用简单的ID获取，确保不报错
        function goNext(current) {
            document.getElementById('level' + current).classList.remove('active');
            let next = current + 1;
            let nextElement = document.getElementById('level' + next);
            if (nextElement) {
                nextElement.classList.add('active');
            } else {
                alert("已经到最后啦！");
            }
        }
    </script>
</body>
</html>
