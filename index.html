<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一份特别的认错报告 💌</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 100%);
            font-family: 'Helvetica Neue', Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #animationCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 420px;
            max-width: 90vw;
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 75, 110, 0.15);
            text-align: center;
            z-index: 10;
            position: absolute;
            transition: all 0.4s ease;
            opacity: 0;
            transform: scale(0.9) translateY(30px);
            pointer-events: none;
        }

        .card.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
            position: relative;
        }

        .card.exit {
            opacity: 0;
            transform: scale(0.9) translateY(-50px);
            pointer-events: none;
        }

        h2 {
            color: #ff4d6d;
            font-size: 22px;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 25px;
            text-align: left;
            white-space: pre-line;
        }

        .btn {
            background: linear-gradient(135deg, #ff758f 0%, #ff4d6d 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
            transition: all 0.2s ease;
            display: inline-block;
            margin-top: 10px;
        }

        .btn:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        .envelope {
            font-size: 70px;
            margin: 15px 0;
            cursor: pointer;
        }

        .progress-container {
            background: #eee;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .progress-bar {
            background: linear-gradient(90deg, #ff8fa3, #ff4d6d);
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .heart-clicker {
            font-size: 60px;
            color: #ff4d6d;
            cursor: pointer;
            display: inline-block;
            margin: 15px 0;
        }

        .clause-list {
            text-align: left;
            margin-bottom: 25px;
        }
        .clause-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
        }
        .clause-item input {
            margin-top: 4px;
            accent-color: #ff4d6d;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
        }
        #escapeBtn {
            position: absolute;
            background: #94a3b8;
        }
    </script>
</head>
<body>

    <canvas id="animationCanvas"></canvas>

    <div id="level1" class="card active">
        <h2>给你的一封神秘信件 💌</h2>
        <div class="envelope" onclick="nextLevel(1)">✉️</div>
        <p style="text-align: center; font-weight: bold; color: #ff758f; margin-bottom: 15px;">你有一封未读的认错请求...</p>
        <button class="btn" onclick="nextLevel(1)">点击拆阅信件</button>
    </div>

    <div id="level2" class="card">
        <h2>系统正在深度反思... 💻</h2>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <p id="typewriterText" style="min-height: 80px; font-weight: 500;"></p>
        <button id="level2Btn" class="btn" style="display: none;" onclick="nextLevel(2)">继续阅读</button>
    </div>

    <div id="level3" class="card">
        <h2>我的心跳现在是 0% 💔</h2>
        <p style="text-align: center;">由于惹你生气，我的心脏已经停止了能量供应。需要小仙女连续戳它 5 次，才能重新启动...</p>
        <div id="heartClicker" class="heart-clicker" onclick="chargeHeart()">❤️</div>
        <div id="chargeStatus" style="font-size: 14px; color: #ff758f; font-weight: bold;">等待充能...</div>
        <button id="level3Btn" class="btn" style="display: none;" onclick="nextLevel(3)">注入能量成功</button>
    </div>

    <div id="level4" class="card">
        <h2>小仙女专属不平等条约 📜</h2>
        <p style="font-size:13px; color:#777; margin-bottom:15px;">请仔细阅读并勾选以下条款，以便生成终身承诺：</p>
        <div class="clause-list">
            <div class="clause-item" onclick="toggleCheck('c1')">
                <input type="checkbox" id="c1" onclick="event.stopPropagation(); checkClauses();">
                <label style="cursor:pointer;">以后一有不高兴，我都在3分钟内无条件开始哄你。</label>
            </div>
            <div class="clause-item" onclick="toggleCheck('c2')">
                <input type="checkbox" id="c2" onclick="event.stopPropagation(); checkClauses();">
                <label style="cursor:pointer;">这周末必须带你去吃好吃的，主动剥虾、擦嘴、拎包。</label>
            </div>
            <div class="clause-item" onclick="toggleCheck('c3')">
                <input type="checkbox" id="c3" onclick="event.stopPropagation(); checkClauses();">
                <label style="cursor:pointer;">永远觉得你最漂亮，把你宠上天。</label>
            </div>
        </div>
        <button id="level4Btn" class="btn" disabled onclick="nextLevel(4)">我已签字画押，申请下一步</button>
    </div>

    <div id="level5" class="card">
        <h2>最后，可以原谅我吗？ 🥺</h2>
        <p style="text-align: center;">反省非常深刻，诚意突破天际，原谅我这一次好不好？</p>
        <div class="btn-group">
            <button class="btn" onclick="triggerFinalSurprise()">大发慈悲原谅你</button>
            <button id="escapeBtn" class="btn" onmouseover="escape(this)" onclick="escape(this)">绝对不原谅！</button>
        </div>
    </div>

    <div id="level6" class="card">
        <h2>🎉 恭喜你收获听话男朋友一只！</h2>
        <div style="font-size: 16px; color: #333; line-height: 2; text-align: center;">
            <p style="text-align: center; font-weight: bold; color: #ff4d6d; font-size: 18px; margin-bottom: 10px;">✨ 谢谢宝贝的原谅！✨</p>
            <p>今天让你不开心了，我保证以后会更加注意，不让你受半点委屈。不开心的事情翻篇啦！今晚听凭您的差遣 ❤️</p>
        </div>
        <div style="margin-top: 20px; font-size: 40px;">🌹🧸🍰</div>
    </div>

    <script>
        function nextLevel(current) {
            document.getElementById('level' + current).classList.remove('active');
            document.getElementById('level' + current).classList.add('exit');
            setTimeout(() => {
                document.getElementById('level' + (current + 1)).classList.add('active');
                if(current === 1) startTypewriter();
            }, 300);
        }

        const dialogs = [
            "正在扫描错误行为... 🚨\n发现‘惹仙女不高兴’一级重罪。",
            "正在启动深刻反思机制... 🧠\n反思结果：我真是一个天字第一号大笨蛋。",
            "反思报告已生成：100%全是我的错。\n惩罚机制已就绪：今后要把你宠得无法无天！"
        ];
        
        function startTypewriter() {
            const bar = document.getElementById('progressBar');
            const txt = document.getElementById('typewriterText');
            let progress = 0;

            const timer = setInterval(() => {
                progress += 1;
                bar.style.width = progress + '%';
                
                if (progress === 15) { txt.innerHTML = dialogs[0].replace(/\n/g, '<br>'); }
                if (progress === 50) { txt.innerHTML = dialogs[1].replace(/\n/g, '<br>'); }
                if (progress === 80) { txt.innerHTML = dialogs[2].replace(/\n/g, '<br>'); }

                if (progress >= 100) {
                    clearInterval(timer);
                    document.getElementById('level2Btn').style.display = 'inline-block';
                }
            }, 40);
        }

        let clicks = 0;
        function chargeHeart() {
            if(clicks < 5) {
                clicks++;
                document.querySelector('#level3 h2').innerText = `我的心跳现在是 ${clicks * 20}% 💓`;
                if(clicks === 5) {
                    document.getElementById('level3 h2').innerText = `我的心跳现在是 100% 💖`;
                    document.getElementById('chargeStatus').innerText = "充能100%！满血复活！💖";
                    document.getElementById('level3Btn').style.display = 'inline-block';
                }
            }
        }

        function toggleCheck(id) {
            document.getElementById(id).checked = !document.getElementById(id).checked;
            checkClauses();
        }
        function checkClauses() {
            const c1 = document.getElementById('c1').checked;
            const c2 = document.getElementById('c2').checked;
            const c3 = document.getElementById('c3').checked;
            document.getElementById('level4Btn').disabled = !(c1 && c2 && c3);
        }

        function escape(btn) {
            btn.style.position = 'fixed';
            btn.style.left = Math.random() * 60 + 20 + 'vw';
            btn.style.top = Math.random() * 60 + 20 + 'vh';
        }
